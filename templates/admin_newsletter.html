<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Newsletter-Abonnenten</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background-color: #f0f0f0; }
  </style>
</head>
<body>
  <h1>Newsletter-Abonnenten</h1>
  <table>
    <tr>
      <th>E-Mail</th>
      <th>Aktiv</th>
      <th>Angemeldet am</th>
      <th>Bestätigt am</th>
    </tr>
    {% for s in subscribers %}
    <tr>
      <td>{{ s.email }}</td>
      <td>{{ "✅" if s.is_active else "❌" }}</td>
      <td>{{ s.created_at.strftime("%d.%m.%Y %H:%M") }}</td>
      <td>{{ s.confirmed_at.strftime("%d.%m.%Y %H:%M") if s.confirmed_at else "-" }}</td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
